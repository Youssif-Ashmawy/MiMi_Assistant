name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the non-hardware packages for CI
          pip install colorama numpy

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/

      - name: Check formatting
        run: |
          ruff format --check src/
