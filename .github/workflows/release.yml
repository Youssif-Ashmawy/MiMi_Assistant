name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release:
    # Only run when CI passed — not on [skip ci] commits (those never trigger CI)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the bot can push commits and tags back to main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: version
        run: |
          current=$(cat version.txt | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$current"
          new="$major.$minor.$((patch + 1))"
          echo "$new" > version.txt
          echo "version=$new" >> $GITHUB_OUTPUT
          echo "tag=v$new" >> $GITHUB_OUTPUT

      - name: Commit version bump and push tag
        run: |
          git add version.txt
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag ${{ steps.version.outputs.tag }}
          git push origin main
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "MiMi Assistant ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target main

      - name: Compute sha256 of release tarball
        id: sha256
        run: |
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          # Retry a few times — GitHub needs a moment to make the tarball available
          for i in 1 2 3 4 5; do
            sha=$(curl -sL "$url" | shasum -a 256 | awk '{print $1}')
            [ "$sha" != "da39a3ee5e6b4b0d3255bfef95601890afd80709" ] && break  # not empty file
            sleep 5
          done
          echo "sha256=$sha" >> $GITHUB_OUTPUT
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Update formula in main repo
        run: |
          # Update url and sha256 in the formula (already checked out above)
          sed -i \
            's|url ".*"|url "${{ steps.sha256.outputs.url }}"|' \
            Formula/mimi-assistant.rb

          sed -i \
            's|sha256 ".*"|sha256 "${{ steps.sha256.outputs.sha256 }}"|' \
            Formula/mimi-assistant.rb

          git add Formula/mimi-assistant.rb
          git commit --amend --no-edit
          git push --force-with-lease origin main
